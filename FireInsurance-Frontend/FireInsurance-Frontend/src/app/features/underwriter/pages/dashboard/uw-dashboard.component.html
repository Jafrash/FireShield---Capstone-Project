<div class="min-h-screen bg-gray-50 p-6">
  <div class="max-w-7xl mx-auto">
    <!-- Header -->
    <div class="mb-8">
      <h1 class="text-3xl font-bold text-gray-900">Underwriter Dashboard</h1>
      <p class="text-gray-600 mt-2">Manage policy subscriptions and claims assigned to you</p>
    </div>

    <!-- Loading -->
    @if (isLoading()) {
      <div class="flex justify-center items-center py-20">
        <div class="w-12 h-12 border-4 border-claret border-t-transparent rounded-full animate-spin"></div>
      </div>
    }

    <!-- Error -->
    @if (errorMessage()) {
      <div class="bg-red-50 border border-red-200 text-red-800 px-4 py-3 rounded-lg mb-6">
        <p>{{ errorMessage() }}</p>
      </div>
    }

    @if (!isLoading()) {
      <!-- Stat Cards -->
      <div class="grid grid-cols-1 md:grid-cols-2 xl:grid-cols-4 gap-6 mb-10">
        @for (card of dashboardCards; track card.title) {
          <div class="glass-card p-6 hover-lift cursor-pointer group" [routerLink]="card.route">
            <div class="flex items-center justify-between">
              <div>
                <p class="text-gray-500 text-xs font-bold uppercase tracking-widest mb-1">{{ card.title }}</p>
                <p class="text-4xl font-black text-gray-900 mt-2 group-hover:text-claret transition-colors">
                  {{ card.value }}
                </p>
              </div>
              <div class="p-4 rounded-2xl transition-all duration-300 shadow-inner group-hover:scale-110"
                   [style.background]="card.color + '20'">
                <span class="material-icons text-3xl" [style.color]="card.color">{{ card.icon }}</span>
              </div>
            </div>
          </div>
        }
      </div>

      <!-- Quick Actions -->
      <div class="glass-card p-8 bg-gradient-to-br from-white to-gray-50">
        <h2 class="text-xl font-black text-gray-900 mb-6 tracking-tight">Quick Actions</h2>
        <div class="grid grid-cols-1 md:grid-cols-2 gap-6">
          <button routerLink="/underwriter/subscriptions"
                  class="flex items-center gap-5 p-6 rounded-2xl border-2 border-gray-100 hover:border-claret hover:shadow-xl hover:shadow-claret/10 transition-all group bg-white">
            <div class="w-14 h-14 rounded-xl flex items-center justify-center group-hover:scale-110 transition-transform"
                 style="background: #8B1E3F20">
              <span class="material-icons text-3xl" style="color: #8B1E3F">card_membership</span>
            </div>
            <div class="text-left">
              <p class="font-black text-gray-900 uppercase tracking-widest text-sm">Policy Subscriptions</p>
              <p class="text-gray-500 text-xs mt-1">Review, assign surveyors &amp; decide</p>
            </div>
            <span class="material-icons text-gray-300 ml-auto group-hover:text-claret transition-colors">arrow_forward</span>
          </button>

          <button routerLink="/underwriter/claims"
                  class="flex items-center gap-5 p-6 rounded-2xl border-2 border-gray-100 hover:border-fuchsia hover:shadow-xl hover:shadow-fuchsia/10 transition-all group bg-white">
            <div class="w-14 h-14 rounded-xl flex items-center justify-center group-hover:scale-110 transition-transform"
                 style="background: #D81B6020">
              <span class="material-icons text-3xl" style="color: #D81B60">assignment</span>
            </div>
            <div class="text-left">
              <p class="font-black text-gray-900 uppercase tracking-widest text-sm">Claims</p>
              <p class="text-gray-500 text-xs mt-1">Assess &amp; approve/reject claims</p>
            </div>
            <span class="material-icons text-gray-300 ml-auto group-hover:text-fuchsia transition-colors">arrow_forward</span>
          </button>
        </div>
      </div>
    }
  </div>
</div>
