<div class="section bg-white relative overflow-hidden">
  <div class="container-custom relative z-10">
    <!-- Section Header -->
    <div class="text-center mb-16 animate-fade-in-down">
      <span class="inline-block px-4 py-2 bg-gradient-to-r from-fire-red/10 to-fire-orange/10 rounded-full text-fire-red text-sm font-bold tracking-wider uppercase mb-4 border border-fire-red/20">
        🔥 Expert Solutions
      </span>
      <h2 class="text-4xl md:text-5xl font-extrabold text-gray-900 tracking-tight mb-4">
        Elite Insurance Ecosystem
      </h2>
      <p class="text-lg md:text-xl text-gray-600 max-w-3xl mx-auto leading-relaxed">
        Precision-engineered protection for your most valuable assets, from risk mitigation to rapid recovery.
      </p>
    </div>

    <!-- Services Grid -->
    <div class="grid grid-cols-1 sm:grid-cols-2 lg:grid-cols-4 gap-8">
      @for (item of services; track item.title; let idx = $index) {
      <div class="feature-card animate-fade-in-up" [style.animation-delay]="(idx * 100) + 'ms'">
        <!-- Icon Container -->
        <div class="w-16 h-16 rounded-2xl bg-gradient-to-br from-fire-red to-fire-orange text-white flex items-center justify-center mb-6 shadow-lg icon-float">
          <span class="material-icons text-3xl">{{ item.icon }}</span>
        </div>

        <!-- Title -->
        <h3 class="text-xl font-bold text-gray-900 mb-3 group-hover:text-gradient-premium transition-colors">
          {{ item.title }}
        </h3>

        <!-- Description -->
        <p class="text-gray-600 leading-relaxed mb-6">
          {{ item.desc }}
        </p>

        <!-- Learn More Link -->
        <div class="flex items-center text-fire-red font-semibold text-sm opacity-0 group-hover:opacity-100 transition-all duration-300 transform translate-x-4 group-hover:translate-x-0">
          Learn more
          <span class="material-icons text-sm ml-1 group-hover:translate-x-1 transition-transform">arrow_forward</span>
        </div>
      </div>
      }
    </div>
  </div>

  <!-- Decorative Background Elements -->
  <div class="absolute top-0 right-0 w-96 h-96 bg-gradient-to-br from-fire-orange/5 to-transparent rounded-full blur-3xl -mr-48 -mt-48 animate-pulse"></div>
  <div class="absolute bottom-0 left-0 w-96 h-96 bg-gradient-to-br from-fire-red/5 to-transparent rounded-full blur-3xl -ml-48 -mb-48 animate-pulse delay-200"></div>
  <div class="absolute top-1/2 left-1/2 transform -translate-x-1/2 -translate-y-1/2 w-[600px] h-[600px] bg-gradient-to-br from-fire-orange/3 to-transparent rounded-full blur-3xl animate-pulse delay-100"></div>
</div>
