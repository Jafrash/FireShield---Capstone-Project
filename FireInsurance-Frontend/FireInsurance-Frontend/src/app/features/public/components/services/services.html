<div class="py-24 bg-white/50 relative overflow-hidden">
  <div class="max-w-7xl mx-auto px-4 sm:px-6 lg:px-8 relative z-10">
    <div class="lg:text-center mb-16">
      <h2 class="text-sm text-claret font-bold tracking-[0.2em] uppercase mb-3">Expert Solutions</h2>
      <p class="text-4xl leading-tight font-extrabold tracking-tight text-gray-900 sm:text-5xl">
        Elite Insurance Ecosystem
      </p>
      <p class="mt-4 max-w-2xl text-lg text-gray-500 lg:mx-auto">
        Precision-engineered protection for your most valuable assets, from risk mitigation to rapid recovery.
      </p>
    </div>

    <div class="mt-10">
      <div class="grid grid-cols-1 gap-8 sm:grid-cols-2 lg:grid-cols-4">
        @for (item of services; track item.title) {
        <div class="group relative bg-white p-8 rounded-[2rem] shadow-sm border border-gray-100 hover:shadow-2xl hover:shadow-claret/5 transition-all duration-500 hover:-translate-y-2">
          <div class="w-14 h-14 rounded-2xl bg-claret/5 text-claret flex items-center justify-center mb-6 group-hover:bg-claret group-hover:text-white transition-all duration-500 shadow-inner">
            <span class="material-icons text-3xl">{{ item.icon }}</span>
          </div>
          <h3 class="text-xl font-bold text-gray-900 mb-3 group-hover:text-claret transition-colors">{{ item.title }}</h3>
          <p class="text-gray-500 leading-relaxed">
            {{ item.desc }}
          </p>
          <div class="mt-6 flex items-center text-claret font-bold text-sm opacity-0 group-hover:opacity-100 transition-all translate-x-4 group-hover:translate-x-0">
            Learn more <span class="material-icons text-sm ml-1">arrow_forward</span>
          </div>
        </div>
        }
      </div>
    </div>
  </div>
  <!-- Decorative background elements -->
  <div class="absolute top-0 right-0 w-96 h-96 bg-fuchsia/5 rounded-full blur-3xl -mr-48 -mt-48 animate-pulse"></div>
  <div class="absolute bottom-0 left-0 w-96 h-96 bg-claret/5 rounded-full blur-3xl -ml-48 -mb-48 animate-pulse" style="animation-delay: 2s"></div>
</div>
